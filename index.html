<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下一頁，繼續是你</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="shell">
    <section id="start-screen" class="start-screen">
      <div class="start-noise"></div>
      <div class="start-card pixel-panel">
        <p class="start-kicker">生日故事模式</p>
        <h1>下一頁，<br>繼續是你</h1>
        <p class="start-date">2005.08.04 → now</p>
        <p class="start-copy">
          先看見你。
          <span>再走到我們。</span>
        </p>
        <button id="start-button" class="pixel-button">PRESS START</button>
      </div>
    </section>

    <main id="game-shell" class="game-shell hidden">
      <header class="page-header">
        <div class="page-copy">
          <p class="eyebrow">人生像素錄</p>
          <h2>吳秉穎的人生篇章</h2>
          <p class="page-intro">慢慢看。</p>
        </div>
        <div class="chapter-pill" id="chapter-progress-label">1 / 7</div>
      </header>

      <nav id="chapter-list" class="chapter-list chapter-rail" aria-label="人生章節"></nav>

      <section class="stage-panel">
        <section class="display-card">
          <section id="scene-frame" class="scene-frame" data-theme="origins">
            <div class="scene-art">
              <div class="scene-atmosphere"></div>
              <div class="scene-overlay scene-overlay-a"></div>
              <div class="scene-overlay scene-overlay-b"></div>
              <div class="scene-overlay scene-overlay-c"></div>
              <div class="scene-props">
                <div class="scene-prop scene-prop-a"></div>
                <div class="scene-prop scene-prop-b"></div>
                <div class="scene-prop scene-prop-c"></div>
                <div class="scene-prop scene-prop-d"></div>
                <div class="scene-prop scene-prop-e"></div>
              </div>
              <div class="scene-pixels"></div>
              <div class="scene-glow"></div>
              <div class="scene-grid"></div>

              <div class="scene-copy">
                <p id="scene-era" class="scene-era"></p>
                <h3 id="scene-title" class="scene-title"></h3>
                <button id="toggle-story-button" class="text-trigger" type="button">顯示這章文字</button>
                <p id="scene-subtitle" class="scene-subtitle hidden"></p>
              </div>

              <div class="scene-nav">
                <button id="prev-button" class="pixel-button alt" type="button">←</button>
                <button id="next-button" class="pixel-button" type="button">→</button>
              </div>

              <button id="final-room-button" class="pixel-button alt final-entry hidden" type="button">
                打開生日房間
              </button>

              <div id="scene-hotspots" class="scene-hotspots" aria-label="互動回憶點"></div>
              <div id="scene-memory-ribbon" class="scene-memory-ribbon" aria-label="場景內回憶"></div>
            </div>
          </section>
        </section>
      </section>
    </main>
  </div>

  <div id="memory-modal" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="memory-title">
    <div class="overlay-backdrop" data-close="memory"></div>
    <article class="memory-card pixel-panel">
      <button id="memory-close" class="overlay-close" type="button" aria-label="關閉">×</button>
      <div class="memory-media">
        <div class="memory-visual pixel-frame">
          <img id="memory-image" alt="" class="hidden">
          <div id="memory-placeholder" class="photo-placeholder">
            <span class="placeholder-chip">這一頁先留白</span>
            <strong id="memory-placeholder-label">等你把這張照片放進來。</strong>
          </div>
        </div>

        <div class="memory-text">
          <p id="memory-kicker" class="eyebrow"></p>
          <h3 id="memory-title-text" class="memory-title"></h3>
          <p id="memory-caption" class="memory-caption"></p>
        </div>
      </div>
    </article>
  </div>

  <div id="final-modal" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="final-title">
    <div class="overlay-backdrop" data-close="final"></div>
    <section class="final-room pixel-panel">
      <button id="final-close" class="overlay-close" type="button" aria-label="關閉">×</button>
      <div class="final-header">
        <p class="eyebrow">下一個篇章</p>
        <h3 id="final-title">生日房間</h3>
        <p class="final-copy">
          這裡留給你最後想讓他看到的照片、影片，還有未來。
        </p>
      </div>

      <div class="final-layout">
        <div class="final-video pixel-frame">
          <video id="final-video" class="hidden" controls playsinline></video>
          <div id="final-video-placeholder" class="video-placeholder">
            <span class="placeholder-chip">生日影片</span>
            <strong>這裡會放你留給他的最後一段話。</strong>
            <p>等你把影片放進來，這裡就會變成結尾。</p>
          </div>
        </div>

        <div class="final-side">
          <div class="final-note pixel-frame">
            <p class="eyebrow">最後的話</p>
            <p id="final-note">
              20 歲不一定只有難關。
              有些新的篇章，也會在這一年開始。
            </p>
          </div>

          <div id="final-gallery" class="final-gallery"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
